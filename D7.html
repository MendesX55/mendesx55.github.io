<!DOCTYPE html>
<html lang="en">

    :root {

    a { color:inherit; text-decoration:none; }
    .screen { display:none; min-height:100dvh; }
    .screen.active { display:block; }
    .app { max-width:430px; margin:0 auto; min-height:100dvh; padding:calc(var(--safe-top) + 16px) 14px calc(var(--safe-bottom) + 18px); }
    .card { background:rgba(22,22,28,.88); border:1px solid rgba(255,255,255,.07); border-radius:30px; box-shadow:var(--shadow); backdrop-filter:blur(18px); }
    .hero { padding:28px 22px; min-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 34px); display:flex; flex-direction:column; justify-content:center; }
    .mark { font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:var(--rose2); margin-bottom:26px; opacity:.85; }
    .title { font-family:'Playfair Display',serif; font-size:48px; line-height:1.02; margin-bottom:10px; }
    .sub { color:var(--muted); font-size:15px; line-height:1.55; max-width:28ch; }
    .main-actions { margin-top:34px; display:grid; gap:14px; }
    .big-btn { border:0; border-radius:26px; min-height:78px; padding:18px 20px; text-align:left; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow); }
    .big-btn .lbl { font-weight:700; font-size:18px; display:block; }
    .big-btn .hint { display:block; margin-top:4px; color:rgba(255,255,255,.72); font-size:13px; }
    .btn-primary { background:linear-gradient(135deg,var(--rose),#c23060); }
    .btn-secondary { background:linear-gradient(135deg,#262632,#1a1a22); border:1px solid rgba(255,255,255,.06); }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
    .icon-btn { width:44px; height:44px; border-radius:14px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.04); color:var(--text); cursor:pointer; }
    .pill { padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.05); color:var(--muted); font-size:12px; border:1px solid rgba(255,255,255,.06); }
    .panel { padding:18px; }
    .section-title { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:4px; }
    .section-sub { color:var(--muted); font-size:14px; line-height:1.5; margin-bottom:18px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:8px; }
    .input, .textarea, .select { width:100%; border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text); border-radius:18px; padding:15px 16px; outline:none; }
    .textarea { min-height:110px; resize:none; }
    .toy-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
    .toy { border:1px solid rgba(255,255,255,.06); background:var(--surface2); border-radius:20px; padding:12px 8px; text-align:center; cursor:pointer; min-height:96px; display:flex; flex-direction:column; justify-content:center; gap:6px; }
    .toy.selected { border-color:rgba(232,83,122,.95); background:rgba(122,28,59,.45); box-shadow:0 10px 24px rgba(232,83,122,.16); }
    .toy .e { font-size:24px; }
    .toy .n { font-size:12px; font-weight:600; line-height:1.15; }
    .score-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
    .score-btn, .decimal-btn { min-height:54px; border-radius:18px; border:1px solid rgba(255,255,255,.06); background:var(--surface2); color:var(--text); cursor:pointer; font-weight:700; }
    .score-btn.active, .decimal-btn.active { background:linear-gradient(135deg,var(--rose),#c23060); border-color:transparent; }
    .decimal-wrap { display:none; gap:10px; grid-template-columns:repeat(4,1fr); margin-bottom:12px; }
    .decimal-wrap.show { display:grid; }
    .custom-score { display:none; margin-bottom:12px; }
    .custom-score.show { display:block; }
    .save-btn { width:100%; min-height:60px; border:0; border-radius:22px; background:linear-gradient(135deg,var(--green),#2d996d); color:#fff; font-weight:700; font-size:17px; cursor:pointer; margin-top:8px; }
    .filter-stack { display:grid; gap:12px; margin-bottom:16px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { padding:9px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--muted); font-size:12px; cursor:pointer; }
    .chip.active { background:rgba(232,83,122,.18); border-color:rgba(232,83,122,.7); color:#fff; }
    .meta-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .results-meta { color:var(--muted); font-size:12px; margin:4px 0 14px; }
    .list { display:grid; gap:12px; }
    .item { padding:14px; border-radius:24px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); }
    .item-top { display:flex; gap:12px; align-items:flex-start; }

    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .item h3 { font-size:15px; line-height:1.35; margin-bottom:6px; }
    .item h3 a { color:#fff; text-decoration:underline; text-decoration-color:rgba(255,255,255,.22); text-underline-offset:3px; }
    .meta { color:var(--muted); font-size:12px; line-height:1.45; }
    .tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .tag { padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.05); font-size:11px; color:#ddd; }

  </style>
</head>
<body>
  <section id="homeScreen" class="screen active">
    <main class="app">
      <div class="card hero">
        <div class="mark">private</div>
        <h1 class="title">Nymph</h1>
        <p class="sub">One-screen manual entry and a full filterable list, tuned for iPhone Pro Max with minimal taps.</p>
        <div class="main-actions">
          <button class="big-btn btn-primary" onclick="openManual()">
            <div><span class="lbl">Manual add</span><span class="hint">Paste link, pick toys, add score, save fast</span></div><div>＋</div>
          </button>
          <button class="big-btn btn-secondary" onclick="openList()">
            <div><span class="lbl">View list</span><span class="hint">Filter sessions, dates, toys, scores, and repeat days</span></div><div>≡</div>
          </button>
        </div>
      </div>
    </main>
  </section>

  <section id="manualScreen" class="screen">
    <main class="app">
      <div class="topbar"><button class="icon-btn" onclick="goHome()">←</button><div class="pill">Manual add</div></div>
      <div class="card panel">
        <h2 class="section-title">Quick entry</h2>
        <p class="section-sub">Everything is on one page for the fewest possible taps.</p>
        <div class="field"><label for="linkInput">Link</label><input id="linkInput" class="input" placeholder="Paste video link"></div>
        <div class="field"><label>Toys involved</label><div id="toyGrid" class="toy-grid"></div></div>
        <div class="field"><label for="remarksInput">Remarks</label><textarea id="remarksInput" class="textarea" placeholder="Optional remarks..."></textarea></div>
        <div class="field">
          <label>Score</label>
          <div id="scoreGrid" class="score-grid"></div>
          <div id="decimalWrap" class="decimal-wrap"></div>
          <div id="customScoreWrap" class="custom-score"><input id="customScoreInput" class="input" placeholder="Custom score, e.g. 11, 11.5, 12"></div>
        </div>
        <button class="save-btn" onclick="saveManual()">Save and exit</button>
      </div>
    </main>
  </section>

  <section id="listScreen" class="screen">
    <main class="app">
      <div class="topbar"><button class="icon-btn" onclick="goHome()">←</button><div class="pill" id="countPill">0 results</div></div>
      <div class="card panel">
        <h2 class="section-title">Session list</h2>
        <p class="section-sub">Filter by toy, score, date, repeat-session days, and search text.</p>
        <div class="filter-stack">
          <input id="searchInput" class="input" placeholder="Search title, link, or remarks" oninput="applyFilters()">
          <div class="meta-row">
            <select id="scoreMin" class="select" onchange="applyFilters()"></select>
            <select id="scoreMax" class="select" onchange="applyFilters()"></select>
          </div>
          <div class="meta-row">
            <input id="dateFrom" type="date" class="input" onchange="applyFilters()">
            <input id="dateTo" type="date" class="input" onchange="applyFilters()">
          </div>
          <div class="chips">
            <button class="chip" id="multiDayChip" onclick="toggleMultiDay()">Multiple sessions on same day</button>
            <button class="chip" onclick="clearFilters()">Clear filters</button>
          </div>
          <div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Toys</div>
            <div id="toyFilters" class="chips"></div>
          </div>
        </div>
        <div class="results-meta" id="resultsMeta"></div>
        <div id="results" class="list"></div>
      </div>
    </main>
  </section>

      const urls = [...new Set(allSessions().map(s => s.lastLink).filter(Boolean).slice(0,40))];
      for (const url of urls) {
        if (metaCache[url]?.hydrated) continue;
        try {
          const res = await fetch('https://r.jina.ai/http://' + url.replace(/^https?:\/\//,''));
          const text = await res.text();
          const title = (text.match(/<title>(.*?)<\/title>/i)||[])[1] || metaCache[url]?.title || url;
          const img = (text.match(/property=["']og:image["'][^>]*content=["']([^"']+)/i)||[])[1] || '';
          metaCache[url] = { title: title.replace(/\s+/g,' ').trim(), thumb: img, href:url, hydrated:true };
        } catch(e) { metaCache[url] = { ...(metaCache[url]||{}), hydrated:true }; }
      }
      if (qs('listScreen').classList.contains('active')) applyFilters();
    }
    renderToyGrid();
    renderScoreGrid();
  </script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
