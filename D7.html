    .panel { padding:18px; }
    .section-title { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:4px; }
    .section-sub { color:var(--muted); font-size:14px; line-height:1.5; margin-bottom:18px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:8px; }

    .textarea { min-height:110px; resize:none; }
    .toy-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
    .toy { border:1px solid rgba(255,255,255,.06); background:var(--surface2); border-radius:20px; padding:12px 8px; text-align:center; cursor:pointer; min-height:96px; display:flex; flex-direction:column; justify-content:center; gap:6px; }
    .toy.selected { border-color:rgba(232,83,122,.95); background:rgba(122,28,59,.45); box-shadow:0 10px 24px rgba(232,83,122,.16); }
    .toy .e { font-size:24px; }
    .toy .n { font-size:12px; font-weight:600; line-height:1.15; }
    .score-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
    .score-btn, .decimal-btn { min-height:54px; border-radius:18px; border:1px solid rgba(255,255,255,.06); background:var(--surface2); color:var(--text); cursor:pointer; font-weight:700; }
    .score-btn.active, .decimal-btn.active { background:linear-gradient(135deg,var(--rose),#c23060); border-color:transparent; }
    .decimal-wrap { display:none; gap:10px; grid-template-columns:repeat(4,1fr); margin-bottom:12px; }

    .custom-score.show { display:block; }
    .save-btn { width:100%; min-height:60px; border:0; border-radius:22px; background:linear-gradient(135deg,var(--green),#2d996d); color:#fff; font-weight:700; font-size:17px; cursor:pointer; margin-top:8px; }

    .chip.active { background:rgba(232,83,122,.18); border-color:rgba(232,83,122,.7); color:#fff; }

    .results-meta { color:var(--muted); font-size:12px; margin:4px 0 14px; }

  <section id="homeScreen" class="screen active">
    <main class="app">
      <div class="card hero">

        <p class="sub">One-screen manual entry and a full filterable list, tuned for iPhone Pro Max with minimal taps.</p>
        <div class="main-actions">

  <section id="manualScreen" class="screen">

      <div class="topbar"><button class="icon-btn" onclick="goHome()">←</button><div class="pill">Manual add</div></div>
      <div class="card panel">
        <h2 class="section-title">Quick entry</h2>
        <p class="section-sub">Everything is on one page for the fewest possible taps.</p>
        <div class="field"><label for="linkInput">Link</label><input id="linkInput" class="input" placeholder="Paste video link"></div>
        <div class="field"><label>Toys involved</label><div id="toyGrid" class="toy-grid"></div></div>
        <div class="field"><label for="remarksInput">Remarks</label><textarea id="remarksInput" class="textarea" placeholder="Optional remarks..."></textarea></div>
        <div class="field">

          <div id="scoreGrid" class="score-grid"></div>
          <div id="decimalWrap" class="decimal-wrap"></div>
          <div id="customScoreWrap" class="custom-score"><input id="customScoreInput" class="input" placeholder="Custom score, e.g. 11, 11.5, 12"></div>

        <button class="save-btn" onclick="saveManual()">Save and exit</button>
      </div>
    </main>
  </section>

  <section id="listScreen" class="screen">
    <main class="app">
      <div class="topbar"><button class="icon-btn" onclick="goHome()">←</button><div class="pill" id="countPill">0 results</div></div>

          </div>
          <div class="chips">

            <button class="chip" onclick="clearFilters()">Clear filters</button>
          </div>
          <div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Toys</div>
            <div id="toyFilters" class="chips"></div>
          </div>
        </div>
        <div class="results-meta" id="resultsMeta"></div>
        <div id="results" class="list"></div>
      </div>
    </main>

    let localSessions = [];
    let selectedToysManual = [];
    let activeFilters = { text: '', minScore: null, maxScore: null, fromDate: '', toDate: '', multiDayOnly: false, toys: [] };
    const metaCache = {};

    function init() {
      try { localSessions = JSON.parse(localStorage.getItem('nymph_sessions') || '[]'); } catch(e) { localSessions = []; }
      buildToyGrid();
      buildScoreGrid();
      buildFilterOptions();
      applyFilters();
    }

    function allSessions() {
      const combined = [...localSessions, ...IMPORTED_SESSIONS];
      return combined.sort((a,b) => new Date(b.dateISO + 'T00:00:00') - new Date(a.dateISO + 'T00:00:00') || b.id - a.id);
    }

    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function changeScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }
    function goHome() { changeScreen('homeScreen'); }
    function openManual() {
      selectedToysManual = [];
      document.getElementById('linkInput').value = '';
      document.getElementById('remarksInput').value = '';
      document.getElementById('customScoreInput').value = '';
      document.querySelectorAll('#manualScreen .toy').forEach(t => t.classList.remove('selected'));
      document.querySelectorAll('#manualScreen .score-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#manualScreen .decimal-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('decimalWrap').classList.remove('show');
      document.getElementById('customScoreWrap').classList.remove('show');
      changeScreen('manualScreen');
    }
    function openList() { applyFilters(); changeScreen('listScreen'); }

    function buildToyGrid() {
      const grid = document.getElementById('toyGrid');
      grid.innerHTML = TOYS.map(t => `<div class="toy" data-id="${t.id}" onclick="toggleToyManual('${t.id}')"><span class="e">${t.emoji}</span><span class="n">${t.name}</span></div>`).join('');
      const fGrid = document.getElementById('toyFilters');
      fGrid.innerHTML = TOYS.map(t => `<button class="chip" id="f_toy_${t.id}" onclick="toggleToyFilter('${t.id}')">${t.emoji} ${t.name}</button>`).join('');
    }

    function toggleToyManual(id) {
      const idx = selectedToysManual.indexOf(id);
      const el = document.querySelector(`#manualScreen .toy[data-id="${id}"]`);
      if(idx > -1) { selectedToysManual.splice(idx,1); el.classList.remove('selected'); }
      else { selectedToysManual.push(id); el.classList.add('selected'); }
    }

    function toggleToyFilter(id) {
      const idx = activeFilters.toys.indexOf(id);
      const el = document.getElementById(`f_toy_${id}`);
      if(idx > -1) { activeFilters.toys.splice(idx,1); el.classList.remove('active'); }
      else { activeFilters.toys.push(id); el.classList.add('active'); }
      applyFilters();
    }

    let selectedMainScore = null;
    let selectedDecimal = null;

    function buildScoreGrid() {
      const wrap = document.getElementById('scoreGrid');
      let html = '';
      for(let i=5; i<=10; i++){ html += `<button class="score-btn" data-v="${i}" onclick="selectMainScore(${i})">${i}</button>`; }
      html += `<button class="score-btn" data-v="custom" onclick="selectMainScore('custom')">Other</button>`;
      wrap.innerHTML = html;

      const decWrap = document.getElementById('decimalWrap');
      let dHtml = '';
      ['.0', '.25', '.5', '.75'].forEach(d => { dHtml += `<button class="decimal-btn" data-v="${d}" onclick="selectDecimal('${d}')">${d}</button>`; });
      decWrap.innerHTML = dHtml;
    }

    function selectMainScore(v) {
      selectedMainScore = v;
      selectedDecimal = null;
      document.querySelectorAll('#manualScreen .score-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#manualScreen .decimal-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('decimalWrap').classList.remove('show');
      document.getElementById('customScoreWrap').classList.remove('show');

      if(v === 'custom') {
        document.querySelector('#manualScreen .score-btn[data-v="custom"]').classList.add('active');
        document.getElementById('customScoreWrap').classList.add('show');
      } else if(v !== null) {
        document.querySelector(`#manualScreen .score-btn[data-v="${v}"]`).classList.add('active');
        document.getElementById('decimalWrap').classList.add('show');
        selectDecimal('.0');
      }
    }

    function selectDecimal(d) {
      selectedDecimal = d;
      document.querySelectorAll('#manualScreen .decimal-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`#manualScreen .decimal-btn[data-v="${d}"]`).classList.add('active');
    }

    function getSelectedScore() {
      if(selectedMainScore === 'custom') {
        const val = parseFloat(document.getElementById('customScoreInput').value);
        return isNaN(val) ? null : val;
      }
      if(selectedMainScore !== null && selectedDecimal !== null) {
        return parseFloat(selectedMainScore) + parseFloat(selectedDecimal);
      }
      return null;
    }

    function buildFilterOptions() {
      const mins = document.getElementById('scoreMin');
      const maxs = document.getElementById('scoreMax');
      let hMin = '<option value="">Min Score</option>';
      let hMax = '<option value="">Max Score</option>';
      for(let i=5; i<=10; i+=0.25){
        hMin += `<option value="${i}">Score: ${i}</option>`;
        hMax += `<option value="${i}">Score: ${i}</option>`;
      }
      mins.innerHTML = hMin; maxs.innerHTML = hMax;
    }

    function toggleMultiDay() {
      activeFilters.multiDayOnly = !activeFilters.multiDayOnly;
      document.getElementById('multiDayChip').classList.toggle('active', activeFilters.multiDayOnly);
      applyFilters();
    }

    function clearFilters() {
      activeFilters = { text: '', minScore: null, maxScore: null, fromDate: '', toDate: '', multiDayOnly: false, toys: [] };
      document.getElementById('searchInput').value = '';
      document.getElementById('scoreMin').value = '';
      document.getElementById('scoreMax').value = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      document.getElementById('multiDayChip').classList.remove('active');
      document.querySelectorAll('#listScreen .chip').forEach(c => c.classList.remove('active'));
      applyFilters();
    }

    function applyFilters() {
      activeFilters.text = document.getElementById('searchInput').value.toLowerCase().trim();
      activeFilters.minScore = document.getElementById('scoreMin').value ? parseFloat(document.getElementById('scoreMin').value) : null;
      activeFilters.maxScore = document.getElementById('scoreMax').value ? parseFloat(document.getElementById('scoreMax').value) : null;
      activeFilters.fromDate = document.getElementById('dateFrom').value;
      activeFilters.toDate = document.getElementById('dateTo').value;

      const items = allSessions();
      const counts = {};
      items.forEach(s => { counts[s.dateISO] = (counts[s.dateISO] || 0) + 1; });

      const filtered = items.filter(s => {
        if(activeFilters.text) {
          const matchText = (s.remarks || '').toLowerCase().includes(activeFilters.text) || 
                            (s.lastLink || '').toLowerCase().includes(activeFilters.text);
          if(!matchText) return false;
        }
        if(activeFilters.minScore !== null && (s.score === null || s.score < activeFilters.minScore)) return false;
        if(activeFilters.maxScore !== null && (s.score === null || s.score > activeFilters.maxScore)) return false;
        if(activeFilters.fromDate && s.dateISO < activeFilters.fromDate) return false;
        if(activeFilters.toDate && s.dateISO > activeFilters.toDate) return false;
        if(activeFilters.multiDayOnly && counts[s.dateISO] <= 1) return false;
        if(activeFilters.toys.length > 0) {
          const hasAll = activeFilters.toys.every(t => s.toys.includes(t));
          if(!hasAll) return false;
        }
        return true;
      });

      document.getElementById('countPill').innerText = `${filtered.length} session${filtered.length===1?'':'s'}`;
      document.getElementById('resultsMeta').innerText = `Showing ${filtered.length} of ${items.length} records total`;

      const resDiv = document.getElementById('results');
      if(filtered.length === 0) {
        resDiv.innerHTML = '<div class="empty">No matching records found. Try resetting filters.</div>';
        return;
      }

      resDiv.innerHTML = filtered.map(s => {
        const toyChips = s.toys.map(tid => {
          const tObj = TOYS.find(t => t.id === tid);
          return tObj ? `<span class="tag">${tObj.emoji} ${tObj.name}</span>` : '';
        }).join('');
        const tags = toyChips ? `<div class="tags">${toyChips}</div>` : '';
        const remarks = s.remarks ? `<div class="remarks">${escapeHtml(s.remarks)}</div>` : '';

        let title = 'Session';
        if(s.lastLink) {
          try { title = new URL(s.lastLink).hostname.replace('www.',''); } catch(e) { title = 'Video Link'; }
        }

        const cache = metaCache[s.lastLink];
        const titleMarkup = s.lastLink ? `<a href="${escapeHtml(s.lastLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(cache?.title || title)}</a>` : 'No link saved';
        const thumbMarkup = cache?.thumb ? `<img src="${escapeHtml(cache.thumb)}" alt="Thumb">` : `<span>${s.lastLink?'▶':'—'}</span>`;

        return `
          <article class="item" data-id="${s.id}">
            <div class="item-top">
              <div class="thumb" id="thumb-${s.id}">${thumbMarkup}</div>
              <div style="flex:1; min-width:0;">
                <h3 id="title-${s.id}">${titleMarkup}</h3>
                <div class="meta">${escapeHtml(s.dateLabel)}${s.time ? ' · ' + escapeHtml(s.time) : ''} · Score: ${s.score !== null ? escapeHtml(s.score) : '—'}${counts[s.dateISO] > 1 ? ' · <span style="color:var(--rose2);font-weight:600;">multi-session day</span>' : ''}</div>
                <div class="meta" style="word-break:break-all; font-size:11px; margin-top:2px; opacity:0.6;">${s.lastLink ? escapeHtml(s.lastLink) : 'No URL stored'}</div>
              </div>
            </div>
            ${tags}
            ${remarks}
          </article>`;
      }).join('');
    }

    function saveManual() {
      const link = document.getElementById('linkInput').value.trim();
      const remarks = document.getElementById('remarksInput').value.trim();
      const score = getSelectedScore();
      
      const now = new Date();
      const dateISO = now.toISOString().split('T')[0];
      const dateLabel = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });

      const newSession = {
        id: Date.now(),
        dateISO,
        dateLabel,
        time,
        links: link ? [link] : [],
        lastLink: link,
        toys: [...selectedToysManual],
        remarks,
        score,
        source: 'local'
      };

      localSessions.unshift(newSession);
      localStorage.setItem('nymph_sessions', JSON.stringify(localSessions));
      
      goHome();
    }

    window.onload = init;
  </script>
