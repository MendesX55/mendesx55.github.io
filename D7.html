    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }

    .panel { padding:18px; }
    .section-title { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:4px; }
    .section-sub { color:var(--muted); font-size:14px; line-height:1.5; margin-bottom:18px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:8px; }
    .input, .textarea, .select { width:100%; border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text); border-radius:18px; padding:15px 16px; outline:none; }
    .textarea { min-height:110px; resize:none; }
    .toy-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
    .toy { border:1px solid rgba(255,255,255,.06); background:var(--surface2); border-radius:20px; padding:12px 8px; text-align:center; cursor:pointer; min-height:96px; display:flex; flex-direction:column; justify-content:center; gap:6px; }
    .toy.selected { border-color:rgba(232,83,122,.95); background:rgba(122,28,59,.45); box-shadow:0 10px 24px rgba(232,83,122,.16); }
    .toy .e { font-size:24px; }
    .toy .n { font-size:12px; font-weight:600; line-height:1.15; }
    .score-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
    .score-btn, .decimal-btn { min-height:54px; border-radius:18px; border:1px solid rgba(255,255,255,.06); background:var(--surface2); color:var(--text); cursor:pointer; font-weight:700; }
    .score-btn.active, .decimal-btn.active { background:linear-gradient(135deg,var(--rose),#c23060); border-color:transparent; }
    .decimal-wrap { display:none; gap:10px; grid-template-columns:repeat(4,1fr); margin-bottom:12px; }
    .decimal-wrap.show { display:grid; }
    .custom-score { display:none; margin-bottom:12px; }
    .custom-score.show { display:block; }
    .save-btn { width:100%; min-height:60px; border:0; border-radius:22px; background:linear-gradient(135deg,var(--green),#2d996d); color:#fff; font-weight:700; font-size:17px; cursor:pointer; margin-top:8px; }

    .chip.active { background:rgba(232,83,122,.18); border-color:rgba(232,83,122,.7); color:#fff; }

    .results-meta { color:var(--muted); font-size:12px; margin:4px 0 14px; }

</head>

  <section id="homeScreen" class="screen active">
    <main class="app">
      <div class="card hero">
        <div class="mark">private</div>
        <h1 class="title">Nymph</h1>
        <p class="sub">One-screen manual entry and a full filterable list, tuned for iPhone Pro Max with minimal taps.</p>
        <div class="main-actions">
          <button class="big-btn btn-primary" onclick="openManual()">

          </button>
          <button class="big-btn btn-secondary" onclick="openList()">

          </button>
        </div>
      </div>
    </main>
  </section>

  <section id="manualScreen" class="screen">
    <main class="app">
      <div class="topbar"><button class="icon-btn" onclick="goHome()">←</button><div class="pill">Manual add</div></div>
      <div class="card panel">
        <h2 class="section-title">Quick entry</h2>
        <p class="section-sub">Everything is on one page for the fewest possible taps.</p>
        <div class="field"><label for="linkInput">Link</label><input id="linkInput" class="input" placeholder="Paste video link"></div>
        <div class="field"><label>Toys involved</label><div id="toyGrid" class="toy-grid"></div></div>
        <div class="field"><label for="remarksInput">Remarks</label><textarea id="remarksInput" class="textarea" placeholder="Optional remarks..."></textarea></div>
        <div class="field">
          <label>Score</label>
          <div id="scoreGrid" class="score-grid"></div>
          <div id="decimalWrap" class="decimal-wrap"></div>
          <div id="customScoreWrap" class="custom-score"><input id="customScoreInput" class="input" placeholder="Custom score, e.g. 11, 11.5, 12"></div>
        </div>
        <button class="save-btn" onclick="saveManual()">Save and exit</button>
      </div>
    </main>
  </section>

  <section id="listScreen" class="screen">
    <main class="app">
      <div class="topbar"><button class="icon-btn" onclick="goHome()">←</button><div class="pill" id="countPill">0 results</div></div>

        <h2 class="section-title">Session list</h2>
        <p class="section-sub">Filter by toy, score, date, repeat-session days, and search text.</p>

          <div class="meta-row">

          </div>
          <div class="chips">
            <button class="chip" id="multiDayChip" onclick="toggleMultiDay()">Multiple sessions on same day</button>
            <button class="chip" onclick="clearFilters()">Clear filters</button>
          </div>
          <div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Toys</div>
            <div id="toyFilters" class="chips"></div>
          </div>
        </div>
        <div class="results-meta" id="resultsMeta"></div>
        <div id="results" class="list"></div>
      </div>
    </main>
  </section>
