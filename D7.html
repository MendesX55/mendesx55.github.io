    header { margin-bottom:40px; display:flex; justify-content:between; align-items:flex-start; flex-wrap:wrap; gap:20px; }
    .brand h1 { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; letter-spacing:-0.5px; margin-bottom:6px; background:linear-gradient(135deg,#f4eef3 30%,var(--rose2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .brand p { color:var(--muted); font-size:0.95rem; font-weight:500; }
    
    .stats-bar { display:flex; gap:16px; flex-wrap:wrap; width:100%; max-width:700px; margin-bottom:30px; }
    .stat-card { flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border); padding:16px; border-radius:16px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
    .stat-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--rose); opacity:0.7; }
    .stat-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; margin-bottom:6px; }
    .stat-val { font-size:1.6rem; font-weight:700; font-family:'Playfair Display',serif; color:#fff; }
    
    .search-container { position:relative; width:100%; margin-bottom:24px; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 20px 16px 50px; color:#fff; font-size:1rem; outline:none; transition:all 0.25s ease; box-shadow:var(--shadow); font-family:inherit; }
    .search-input:focus { border-color:var(--rose); background:var(--surface2); box-shadow:0 0 0 3px rgba(232,83,122,0.15); }
    .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1.2rem; pointer-events:none; }
    
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; margin-bottom:32px; box-shadow:var(--shadow); }
    .section-title { font-size:0.85rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    
    .filter-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:10px; margin-bottom:24px; }
    .btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px 14px; border-radius:12px; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s cubic-bezier(0.4,0,0.2,1); display:flex; align-items:center; justify-content:center; text-align:center; position:relative; }
    .btn:hover { background:var(--surface3); border-color:var(--muted); }
    .btn.active { background:var(--rose); border-color:var(--rose); color:#fff; box-shadow:0 4px 14px rgba(232,83,122,0.3); }
    .btn-badge { position:absolute; top:-6px; right:-6px; background:var(--surface3); border:1px solid var(--border); color:var(--rose2); font-size:0.7rem; font-weight:700; padding:2px 6px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
    .btn.active .btn-badge { background:#fff; color:var(--rose); border-color:#fff; }
    
    .range-container { display:flex; align-items:center; gap:16px; background:var(--surface2); padding:14px 20px; border-radius:14px; border:1px solid var(--border); width:fit-content; min-width:300px; }
    .range-label { font-size:0.85rem; font-weight:600; color:var(--muted); min-width:70px; }
    .range-slider { flex:1; -webkit-appearance:none; appearance:none; background:var(--surface3); height:6px; border-radius:3px; outline:none; }
    .range-slider::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--rose); cursor:pointer; transition:transform 0.1s; }
    .range-slider::-webkit-slider-thumb:hover { transform:scale(1.2); }
    .range-val { font-size:0.95rem; font-weight:700; color:var(--rose2); min-width:30px; text-align:right; }
    
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:24px; }
    @media(max-width:400px) { .grid { grid-template-columns:1fr; } }
    
    .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; box-shadow:var(--shadow); transition:all 0.3s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; position:relative; }
    .card:hover { transform:translateY(-4px); border-color:rgba(232,83,122,0.3); box-shadow:0 22px 45px rgba(0,0,0,0.45); }
    
    .media-container { width:100%; aspect-ratio:16/9; background:var(--surface2); position:relative; overflow:hidden; border-bottom:1px solid var(--border); }
    .media-thumb { width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.4s ease; }
    .media-thumb.loaded { opacity:1; }
    .media-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--surface3); font-size:3rem; pointer-events:none; z-index:1; }
    .media-placeholder svg { width:48px; height:48px; fill:currentColor; margin-bottom:8px; opacity:0.4; }
    .card:hover .media-placeholder { color:var(--border); }
    
    .card-body { padding:20px; flex:1; display:flex; flex-direction:column; justify-content:between; gap:14px; }
    .card-main h3 { font-size:1.05rem; font-weight:600; line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-main h3 a { color:var(--text); text-decoration:none; transition:color 0.2s; }
    .card-main h3 a:hover { color:var(--rose2); }
    .meta { font-size:0.8rem; color:var(--muted); font-weight:500; display:flex; align-items:center; gap:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    
    .tags-wrapper { display:flex; flex-wrap:wrap; gap:6px; }
    .tag { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:5px 10px; border-radius:8px; background:rgba(232,83,122,0.08); color:var(--rose2); border:1px solid rgba(232,83,122,0.15); }
    .tag.remark-tag { background:rgba(240,179,95,0.08); color:var(--gold); border-color:rgba(240,179,95,0.15); }
    
    .remarks-box { font-size:0.85rem; line-height:1.45; color:var(--muted); background:var(--surface2); border-left:3px solid var(--border); padding:10px 12px; border-radius:0 10px 10px 0; font-style:italic; }
    .card:hover .remarks-box { border-left-color:var(--rose); }

    .score-badge.high { color:var(--gold); }
    
    .sentinel { height:40px; margin-top:20px; }
  </style>

    // Normalized parsing structure
    let parsedSessions = [];
    let counts = {};
    let metaCache = {};

    function parseDate(dStr) {
      if (!dStr) return null;
      const parts = dStr.trim().split(/\s+/);
      if (parts.length < 3) return null;
      const day = parseInt(parts[0], 10);
      const months = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
      const mIdx = months[parts[1].toLowerCase().substring(0,3)];
      const year = parseInt(parts[2], 10);
      if (isNaN(day) || mIdx === undefined || isNaN(year)) return null;
      return new Date(year, mIdx, day);
    }

    // Process raw array mapping
    rawData.forEach(row => {
      const dObj = parseDate(row.Date);
      if (!dObj) return;
      const iso = dObj.toISOString().split('T')[0];
      counts[iso] = (counts[iso] || 0) + 1;
      
      let matchedToys = [];
      toyKeys.forEach(k => { if(row[k] === 'X') matchedToys.push(k); });
      
      let matchedRemarks = [];
      const rm = row.Remarks || "";
      remarkKeys.forEach(k => {
        if(rm.toLowerCase().includes(k.toLowerCase())) matchedRemarks.push(k);
      });

      parsedSessions.push({
        dateObj: dObj,
        dateISO: iso,
        dateLabel: row.Date,
        toys: matchedToys,
        remarks: row.Remarks || "",
        remarkTags: matchedRemarks,
        score: row.Score !== undefined && row.Score !== "" ? parseFloat(row.Score) : null,
        lastLink: row.Link || ""
      });
    });

    // Sort chronologically descending
    parsedSessions.sort((a,b) => b.dateObj - a.dateObj);

    // Active State Management
    let selectedToys = new Set();
    let selectedRemarks = new Set();
    let minScore = 0;
    let searchQuery = "";
    let displayLimit = 24;

    // Build unique option tallies dynamically
    function getFilterCounts() {
      let toyTallies = {};
      let remarkTallies = {};
      toyKeys.forEach(k => toyTallies[k] = 0);
      remarkKeys.forEach(k => remarkTallies[k] = 0);

      parsedSessions.forEach(s => {
        let matchesScore = (minScore === 0 || (s.score !== null && s.score >= minScore));
        let matchesText = true;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          matchesText = s.dateLabel.toLowerCase().includes(q) || 
                        s.remarks.toLowerCase().includes(q) || 
                        s.lastLink.toLowerCase().includes(q);
        }
        if (!matchesScore || !matchesText) return;

        // Check intersections for secondary matrices
        let matchesToys = selectedToys.size === 0 || [...selectedToys].every(t => s.toys.includes(t));
        let matchesRemarks = selectedRemarks.size === 0 || [...selectedRemarks].every(r => s.remarkTags.includes(r));

        if (matchesRemarks) {
          s.toys.forEach(t => { toyTallies[t] = (toyTallies[t] || 0) + 1; });
        }
        if (matchesToys) {
          s.remarkTags.forEach(r => { remarkTallies[r] = (remarkTallies[r] || 0) + 1; });
        }
      });
      return { toyTallies, remarkTallies };
    }

    // Filter Logic Pipeline
    function allSessions() {
      return parsedSessions.filter(s => {
        if (minScore > 0 && (s.score === null || s.score < minScore)) return false;
        if (selectedToys.size > 0 && ![...selectedToys].every(t => s.toys.includes(t))) return false;
        if (selectedRemarks.size > 0 && ![...selectedRemarks].every(r => s.remarkTags.includes(r))) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return s.dateLabel.toLowerCase().includes(q) || 
                 s.remarks.toLowerCase().includes(q) || 
                 s.lastLink.toLowerCase().includes(q);
        }
        return true;
      });
    }

    // UI Configuration Elements
    const grid = document.getElementById('log-grid');
    const searchInput = document.getElementById('search-bar');
    const rangeInput = document.getElementById('score-range');
    const rangeVal = document.getElementById('score-val');
    const toyFilterGrid = document.getElementById('toy-filters');
    const remarkFilterGrid = document.getElementById('remark-filters');

    function buildFilters() {
      const { toyTallies, remarkTallies } = getFilterCounts();
      
      toyFilterGrid.innerHTML = toyKeys.map(k => {
        const active = selectedToys.has(k) ? 'active' : '';
        const count = toyTallies[k] || 0;
        return `<button class="btn ${active}" onclick="toggleToy('${escapeHtml(k)}')">${escapeHtml(k)}<span class="btn-badge">${count}</span></button>`;
      }).join('');

      remarkFilterGrid.innerHTML = remarkKeys.map(k => {
        const active = selectedRemarks.has(k) ? 'active' : '';
        const count = remarkTallies[k] || 0;
        return `<button class="btn ${active}" onclick="toggleRemark('${escapeHtml(k)}')">${escapeHtml(k)}<span class="btn-badge">${count}</span></button>`;
      }).join('');
    }

    function toggleToy(k) {
      if(selectedToys.has(k)) selectedToys.delete(k); else selectedToys.add(k);
      displayLimit = 24; updateUI();
    }
    function toggleRemark(k) {
      if(selectedRemarks.has(k)) selectedRemarks.delete(k); else selectedRemarks.add(k);
      displayLimit = 24; updateUI();
    }

    searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; displayLimit = 24; updateUI(); });
    rangeInput.addEventListener('input', (e) => { minScore = parseFloat(e.target.value); rangeVal.textContent = minScore; displayLimit = 24; updateUI(); });

    function escapeHtml(str) {
      if(!str) return '';
      return str.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function renderSessions() {
      const filtered = allSessions();
      
      // Compute dashboard data points
      document.getElementById('stat-total').textContent = parsedSessions.length;

            </div>
            <div class="card-body">
              <div class="card-main">
                <h3>${s.lastLink ? `<a href="${escapeHtml(s.lastLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(title)}</a>` : 'No link saved'}</h3>

              </div>
              ${tags}
              ${remarks}
            </div>
          </article>
        `;
      }).join('');
    }

    // Corrected, Ultra-Robust Metadata Extraction Loop
    async function hydrateVisibleMetadata() {
      // Pull context items visible within current processing limits
      const urls = [...new Set(allSessions().map(s => s.lastLink).filter(Boolean).slice(0, 40))];
      
      for (const url of urls) {
        if (metaCache[url]?.hydrated) continue;
        
        try {
          // Pass absolute URL structure directly to avoid downstream routing/protocol mismatches
          const res = await fetch('https://r.jina.ai/' + url);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          const text = await res.text();
          
          // Match page title across flexible layout tags
          const titleMatch = text.match(/<title[^>]*>(.*?)<\/title>/i);
          let title = titleMatch ? titleMatch[1].replace(/\s+/g, ' ').trim() : '';
          
          if (title) {
            title = title.replace(/\s*-\s*Pornhub\.com$/i, '').replace(/^Watch\s+/i, '');

            title = metaCache[url]?.title || 'Watch Video';

          let img = '';
          const imgMatchPropertyFirst = text.match(/property=["']og:image["'][^>]*content=["']([^"']+)/i);

          if (imgMatchPropertyFirst) {
            img = imgMatchPropertyFirst[1];
          } else if (imgMatchContentFirst) {
            img = imgMatchContentFirst[1];
          }
          
          metaCache[url] = { 
            title: title, 
            thumb: img, 
            href: url, 
            hydrated: true 
          };
          
          renderSessions();
          
        } catch (e) {
          console.warn("Could not fetch metadata pipeline metrics for target:", url, e);
          
          // Block infinite fallback loops by resolving token placeholders immediately
          const fallbackTitle = url.includes('viewkey=') 
            ? 'Video (ID: ' + url.split('viewkey=')[1].split(/[&#]/)[0] + ')'
            : 'Watch Video';
            
          metaCache[url] = {
            title: metaCache[url]?.title || fallbackTitle,
            thumb: metaCache[url]?.thumb || '',
            href: url,
            hydrated: true
          };
          
          renderSessions();
        }
      }

      buildFilters();
      renderSessions();
      hydrateVisibleMetadata();
    }

    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && displayLimit < allSessions().length) {
        displayLimit += 24;
        renderSessions();
        hydrateVisibleMetadata();
      }

    updateUI();
